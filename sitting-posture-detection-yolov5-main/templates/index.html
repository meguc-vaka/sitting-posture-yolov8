<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 坐姿即時監測</title>
    <style>
        body {
            background-color: #323844;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        h1 { font-weight: bold; margin-bottom: 30px; }
        
        /* 下拉選單與按鈕樣式 */
        select, button {
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid #4A5568;
            font-weight: bold;
            margin: 0 5px;
        }
        select { background-color: white; color: #333; }
        #startBtn { background-color: #4CAF50; color: white; cursor: pointer; }
        #stopBtn { background-color: #E53E3E; color: white; cursor: pointer; }
        
        /* 影像外框 */
        .video-box {
            margin: 20px auto;
            border: 3px solid #4A5568;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 坐姿即時監測</h1>
    
    <div style="margin-bottom: 30px;">
        <label>選擇相機：</label>
        <select id="cameraSelect">
            {% for name, id in cameras.items() %}
                <option value="{{ id }}">{{ name }}</option>
            {% endfor %}
        </select>
        <button id="startBtn">開始監測</button>
        <button id="stopBtn">暫停</button>
    </div>

    <div class="video-box" style="position: relative; width: 730px; height: 550px;">
        <img id="videoStream" src="" width="730" height="550" style="display: none; object-fit: contain;">
        
        <div id="placeholder" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #777; font-size: 1.2rem;">
            📷 攝影機已關閉，請點擊開始監測
        </div>
    </div>
    
    <p style="color: #A0AEC0; font-size: 0.9rem;">Model: {{ model_name }} | Version: 2026.03</p>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const videoImg = document.getElementById('videoStream');
    const placeholder = document.getElementById('placeholder');
    const cameraSelect = document.getElementById('cameraSelect');

    startBtn.onclick = function() {
        const id = cameraSelect.value;
        console.log("嘗試開啟相機 ID:", id);

        videoImg.style.display = "block";
        placeholder.style.display = "none";

        // 設定 src 並加上時間戳記防止快取 (Cache Buster)
        // 這樣瀏覽器才會真正去重新請求 /video_feed
        videoImg.src = "/video_feed/" + id + "?t=" + new Date().getTime();
    };

    stopBtn.onclick = function() {
        // 停止串流
        videoImg.src = ""; 
        videoImg.style.display = "none";
        placeholder.style.display = "flex";
    };
</script>

</body>
</html>
